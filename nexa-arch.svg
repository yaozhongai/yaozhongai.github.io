<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <title>Nexa Agent Architecture</title>
  <desc>Architecture diagram showing ReAct + Reflexion dual-loop agent system with tools, memory, and model routing</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#666"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Reflexion outer loop background -->
  <rect x="16" y="60" width="668" height="404" rx="12" fill="var(--diagram-bg, #f5f5f5)" stroke="var(--border, #e0e0e0)" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="36" y="84" font-size="11" font-weight="600" fill="var(--text-muted, #888)" letter-spacing="0.08em">REFLEXION OUTER LOOP · MAX 3 TRIALS</text>

  <!-- User Query -->
  <rect x="270" y="4" width="160" height="36" rx="8" fill="var(--accent, #2563eb)" />
  <text x="350" y="27" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">User Query</text>
  <line x1="350" y1="40" x2="350" y2="100" stroke="var(--text-muted, #666)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Memory Retrieval -->
  <rect x="60" y="100" width="130" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="var(--border, #ddd)" stroke-width="1.2"/>
  <text x="125" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text, #333)">Memory</text>
  <text x="125" y="134" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">STM + LTM + KB</text>

  <!-- ReAct Engine -->
  <rect x="240" y="100" width="220" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="var(--accent, #2563eb)" stroke-width="1.8"/>
  <text x="350" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="var(--accent, #2563eb)">ReAct Engine</text>
  <text x="350" y="134" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">Thought → Action → Observation</text>

  <!-- Arrow: Memory → ReAct -->
  <line x1="190" y1="122" x2="238" y2="122" stroke="var(--text-muted, #666)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Tools box -->
  <rect x="510" y="94" width="160" height="56" rx="8" fill="var(--card-bg, #fff)" stroke="var(--border, #ddd)" stroke-width="1.2"/>
  <text x="590" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text, #333)">9 Tools</text>
  <text x="590" y="129" text-anchor="middle" font-size="9" fill="var(--text-muted, #888)">Search · Fetch · Wiki</text>
  <text x="590" y="143" text-anchor="middle" font-size="9" fill="var(--text-muted, #888)">VLM · Calculator · Save</text>

  <!-- Arrow: ReAct ↔ Tools -->
  <line x1="460" y1="118" x2="508" y2="118" stroke="var(--text-muted, #666)" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="508" y1="128" x2="460" y2="128" stroke="var(--text-muted, #666)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrow: ReAct → Evaluator -->
  <line x1="350" y1="144" x2="350" y2="190" stroke="var(--text-muted, #666)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Evaluator -->
  <rect x="260" y="192" width="180" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="var(--border, #ddd)" stroke-width="1.2"/>
  <text x="350" y="210" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text, #333)">Evaluator</text>
  <text x="350" y="226" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">loop · overflow · misuse</text>

  <!-- Pass → Verifier -->
  <line x1="350" y1="236" x2="350" y2="282" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <text x="364" y="264" font-size="10" font-weight="600" fill="#16a34a">Pass</text>

  <!-- Verifier -->
  <rect x="270" y="284" width="160" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="350" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Verifier</text>
  <text x="350" y="318" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">Fact Gateway</text>

  <!-- Verifier → Output -->
  <line x1="350" y1="328" x2="350" y2="370" stroke="#16a34a" stroke-width="1.2" marker-end="url(#arrow-green)"/>
  <rect x="290" y="372" width="120" height="34" rx="8" fill="#16a34a"/>
  <text x="350" y="394" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Output</text>

  <!-- Fail → Reflector -->
  <line x1="440" y1="214" x2="560" y2="214" stroke="#dc2626" stroke-width="1.2"/>
  <line x1="560" y1="214" x2="560" y2="282" stroke="#dc2626" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <text x="490" y="206" font-size="10" font-weight="600" fill="#dc2626">Fail</text>

  <!-- Reflector -->
  <rect x="490" y="284" width="150" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="#dc2626" stroke-width="1.5"/>
  <text x="565" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Reflector</text>
  <text x="565" y="318" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">Lesson Extraction</text>

  <!-- Reflector → Memory (feedback loop) -->
  <line x1="490" y1="306" x2="125" y2="306" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5 3"/>
  <line x1="125" y1="306" x2="125" y2="146" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="300" y="300" text-anchor="middle" font-size="9" fill="#dc2626">update memory → retry</text>

  <!-- Model Router -->
  <rect x="60" y="192" width="150" height="56" rx="8" fill="var(--card-bg, #fff)" stroke="var(--border, #ddd)" stroke-width="1.2"/>
  <text x="135" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text, #333)">Model Router</text>
  <text x="135" y="228" text-anchor="middle" font-size="9" fill="var(--text-muted, #888)">DeepSeek V4 flash/pro</text>
  <text x="135" y="241" text-anchor="middle" font-size="9" fill="var(--text-muted, #888)">Kimi K2.6 · GLM-5.1</text>

  <!-- Trace System -->
  <rect x="60" y="372" width="150" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="var(--border, #ddd)" stroke-width="1.2"/>
  <text x="135" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text, #333)">Trace System</text>
  <text x="135" y="406" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">runs · events · SSE</text>

  <!-- Milvus + BM25 -->
  <rect x="60" y="284" width="150" height="44" rx="8" fill="var(--card-bg, #fff)" stroke="var(--border, #ddd)" stroke-width="1.2"/>
  <text x="135" y="302" text-anchor="middle" font-size="11" font-weight="600" fill="var(--text, #333)">Hybrid Retrieval</text>
  <text x="135" y="318" text-anchor="middle" font-size="10" fill="var(--text-muted, #888)">Milvus + BM25</text>

  <!-- Legend -->
  <line x1="40" y1="450" x2="70" y2="450" stroke="#16a34a" stroke-width="1.5"/>
  <text x="76" y="454" font-size="10" fill="var(--text-muted, #888)">Pass path</text>
  <line x1="160" y1="450" x2="190" y2="450" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="196" y="454" font-size="10" fill="var(--text-muted, #888)">Fail → Reflect → Retry</text>
  <line x1="360" y1="450" x2="390" y2="450" stroke="var(--text-muted, #666)" stroke-width="1.5"/>
  <text x="396" y="454" font-size="10" fill="var(--text-muted, #888)">Data flow</text>
</svg>