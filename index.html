      background: #fafafa;
      color: #2c2c2c;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px 60px;
    }

    /* Header */
    header {
      margin-bottom: 36px;
    }

    .name {
      font-size: 2.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #1a1a1a;
    }

    .title {
      font-size: 1.08rem;
      color: #555;
      margin-top: 10px;
      font-weight: 400;
    }

    .subtitle {
      font-size: 0.88rem;
      color: #666;
      margin-top: 8px;
      font-weight: 400;
      line-height: 1.7;
    }

    /* Sections */
    section {
      margin-bottom: 28px;
    }

    .section-label {
      font-size: 1.02rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #777;
      font-style: normal;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.98rem;
      line-height: 1.75;
      color: #3f3f3f;
    }

    /* Links */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .link-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 1.02rem;
      font-weight: 500;
      color: #1a1a1a;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    .link-item:hover {
      border-color: #1a1a1a;
    }

    .link-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid #e8e8e8;
      font-size: 0.8rem;
      color: #aaa;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 40px 20px 40px;
      }
      .name {
        font-size: 1.6rem;
      }
      .section-label {
        font-size: 0.82rem;
      }
      p {
        font-size: 1rem;
      }
      .link-item {
        font-size: 0.98rem;
      }
